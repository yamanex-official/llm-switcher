name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, os: windows-latest, ext: ".exe" }
          - { goos: darwin,  goarch: arm64,  os: macos-latest,    ext: "" }
          - { goos: linux,   goarch: amd64, os: ubuntu-latest,   ext: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/llm-switcher-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/llm-switcher
      - name: sign (macOS)
        if: matrix.goos == 'darwin'
        run: |
          codesign --force --deep --sign - "dist/llm-switcher-darwin-arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: llm-switcher-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
